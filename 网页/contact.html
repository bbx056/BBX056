    <section id="contact" class="section" style="padding-top: 60px;">

                    <h4>邮箱</h4>

                <div class="form-row">
                    <input type="text" placeholder="你的姓名" required>
                    <input type="email" placeholder="你的邮箱" required>
                </div>
                <input type="text" placeholder="项目主题" required>
                <textarea placeholder="请描述你的项目需求..." required></textarea>
                <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">发送消息</button>
            </form>
        </div>
    </section>

    <section class="section" style="background: var(--light);">
        <div class="contact-container" style="text-align: center;">
            <div class="section-title" style="margin-bottom: 30px;">
